services:
  - type: web
    name: shopee-debt-tracker
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: shopee-debt-tracker-db
          property: connectionString

databases:
  - name: shopee-debt-tracker-db
    plan: free
